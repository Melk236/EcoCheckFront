<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" (click)="cerrar.emit()">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-lg h-[90dvh] mx-4 transform transition-all animate-in fade-in zoom-in duration-300 overflow-hidden" (click)="$event.stopPropagation()">
    <div class="px-8 pt-8 pb-4 flex justify-between items-start border-b border-gray-100 dark:border-gray-700">
      <div>
        <span class="text-xs font-bold uppercase tracking-widest mb-1 block text-[#39E079] dark:text-[#39E079]">Scan Success</span>
        <h2 class="text-3xl font-black tracking-tight text-[#181211] dark:text-white">Producto Detectado</h2>
      </div>
      <button class="p-2 transition-colors text-[#b5aeab] dark:text-gray-400 hover:text-[#181211] dark:hover:text-white" (click)="cerrar.emit()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-8">
      <div class="relative group">
        <div class="w-full h-48 rounded-lg mb-4 shadow-inner bg-[#f5f5f5] dark:bg-gray-700 overflow-hidden">
          <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="Product" [src]="producto.imagenUrl" />
        </div>
        <div class="absolute -top-4 -right-4 w-24 h-24 bg-white dark:bg-gray-800 rounded-full p-1.5 shadow-lg flex items-center justify-center">
          <div class="w-full h-full rounded-full flex flex-col items-center justify-center relative overflow-hidden border-4" [ngClass]="producto.ecoScore <= 40 ? 'border-red-500/30' : producto.ecoScore < 80 ? 'border-yellow-500/30' : 'border-green-500/30'">
            <div class="absolute inset-0" [ngClass]="producto.ecoScore <= 40 ? 'bg-red-500/10' : producto.ecoScore < 80 ? 'bg-yellow-500/10' : 'bg-green-500/10'"></div>
            <span class="text-2xl font-black leading-none" [ngClass]="getColorClase(producto.ecoScore)">{{producto.ecoScore}}</span>
            <span class="text-[10px] font-bold uppercase" [ngClass]="producto.ecoScore <= 40 ? 'text-red-500/70' : producto.ecoScore < 80 ? 'text-yellow-500/70' : 'text-green-500/70'">Score</span>
            <div class="absolute bottom-0 left-0 h-1.5" [ngClass]="getBgColorClase(producto.ecoScore)" [style.width]="(producto.ecoScore / 100 * 100) + '%'"></div>
          </div>
        </div>
      </div>
      <div class="flex justify-between items-end mb-8">
        <div>
          <h3 class="text-2xl font-black leading-tight text-[#181211] dark:text-white">{{producto.nombre}}</h3>
          <p class="font-medium flex items-center gap-1.5 mt-1 text-[#896861] dark:text-gray-400">
            <span class="material-symbols-outlined text-base">verified</span>
            {{'De '+nombreEmpresa}}
          </p>
        </div>
        <div class="flex items-center gap-1 px-3 py-1 rounded-full text-sm font-bold" [ngClass]="producto.ecoScore <= 40 ? 'bg-red-500/10 text-red-500 dark:bg-red-500/15 dark:text-red-400' : producto.ecoScore < 80 ? 'bg-yellow-500/10 text-yellow-500 dark:bg-yellow-500/15 dark:text-yellow-400' : 'bg-green-500/10 text-green-500 dark:bg-green-500/15 dark:text-green-400'">
          <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;" [ngClass]="getColorClase(producto.ecoScore)">eco</span>
          {{getLabelTexto(producto.ecoScore)}}
        </div>
      </div>
    </div>
    <div class="p-8 pt-0 flex gap-4">
      <button class="flex-1 px-6 py-4 rounded-xl border-2 font-bold transition-all active:scale-95 border-[#e6dddb] text-[#896861] dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-700" (click)="cerrar.emit()">
        Cancelar
      </button>
      <button style="flex: 2; padding: 1rem 1.5rem; border-radius: 0.75rem; font-weight: 900; box-shadow: 0 10px 15px -3px rgba(156, 241, 189, 0.3); background-color: #39E079; color: #181211; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: transform 0.2s ease-out; cursor: pointer;"
        class="" (click)="irAdetalles()">
        Ver Detalles Completos
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </div>
</div>
